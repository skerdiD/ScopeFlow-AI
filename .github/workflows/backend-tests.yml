name: Backend Tests

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scopeflow_ci
          POSTGRES_USER: scopeflow
          POSTGRES_PASSWORD: scopeflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scopeflow -d scopeflow_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "server/requirements.txt"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run proposal backend tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          DATABASE_URL: postgresql://scopeflow:scopeflow@127.0.0.1:5432/scopeflow_ci?sslmode=disable
        run: python manage.py test proposals --verbosity 2
