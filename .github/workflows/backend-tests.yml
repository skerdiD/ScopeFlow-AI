name: Backend Tests

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "Django>=6.0,<6.1" \
            "djangorestframework>=3.15,<3.16" \
            "django-cors-headers>=4.4,<4.5" \
            "requests>=2.31,<3.0" \
            "python-dotenv>=1.0,<2.0"

      - name: Run proposal backend tests
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py test proposals --verbosity 2
